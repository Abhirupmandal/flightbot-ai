version: '3.8'

services:
  client:
    build:
      context: ./client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
      - VITE_SOCKET_URL=http://localhost:3000
    depends_on:
      - server

  server:
    build:
      context: ./server
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/flightbot
      - REDIS_URI=redis://redis:6379
      - POSTGRES_URI=postgresql://postgres:postgres@postgres:5432/flightbot
      - JWT_SECRET=development_secret_key_change_in_production
      - AI_ENGINE_URL=http://ai-engine:8000
    depends_on:
      - mongo
      - redis
      - postgres
      - ai-engine

  ai-engine:
    build:
      context: ./ai-engine
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/flightbot
      - REDIS_URI=redis://redis:6379
      - POSTGRES_URI=postgresql://postgres:postgres@postgres:5432/flightbot
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - mongo
      - redis
      - postgres

  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=flightbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  mongo_data:
  redis_data:
  postgres_data:
