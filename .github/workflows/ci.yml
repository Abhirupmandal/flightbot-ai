name: CI Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 ai-engine/

  lint-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd server && npm install
          cd ../client && npm install
      - name: Run ESLint
        run: |
          cd server && npm run lint
          cd ../client && npm run lint

  test-ai-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          cd ai-engine
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Download spaCy Model
        run: python -m spacy download en_core_web_sm
      - name: Run Pytest
        run: |
          cd ai-engine
          pytest tests/ -v

  test-server:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
      redis:
        image: redis:7.0
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: cd server && npm install
      - name: Run Jest tests
        env:
          MONGODB_URI: mongodb://localhost:27017/flightbot_test
          REDIS_URI: redis://localhost:6379
          JWT_SECRET: test_secret_ci_key
        run: cd server && npm test

  test-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: cd client && npm install
      - name: Run Vitest tests
        run: cd client && npm test -- --run

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-python, lint-js, test-ai-engine, test-server, test-client]
    steps:
      - uses: actions/checkout@v3
      - name: Build Server Image
        run: docker-compose build server
      - name: Build Client Image
        run: docker-compose build client
      - name: Build AI-Engine Image
        run: docker-compose build ai-engine
